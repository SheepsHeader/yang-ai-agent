spring:
  application:
    name: yang-ai-agent
  profiles:
    active: local
  ai:
    dashscope:
      chat:
        options:
          model: qwen-flash
    vectorstore:
      pgvector:
        index-type: HNSW
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        max-document-batch-size: 10000
  # MySQL 主数据源（业务数据 + MyBatis）
  datasource:
    url: jdbc:mysql://localhost:3307/yang_ai_agent?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: abcd1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  mybatis:
    mapper-locations: classpath:mapper/**/*.xml
    type-aliases-package: com.example.yangaiagent.entity
    configuration:
      map-underscore-to-camel-case: true
      cache-enabled: false

# PgVector 独立 PostgreSQL 数据源
pgvector:
  datasource:
    url: jdbc:postgresql://localhost:5432/yu_ai_agent
    username: postgresql
    password: password
    driver-class-name: org.postgresql.Driver

server:
  port: 8123
  servlet:
    context-path: /api

# springdoc-openapi项目配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn